<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Simulasi lampu</title>
        <link rel="stylesheet"

    <body class="body">

                <a href="https://www.instagram.com/rizaldimuarifr/"><i

        <!-- ruangan keluarga -->
